<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <circle cx="100" cy="100" r="40" fill="#000000" />
  
  <!-- Belly -->
  <circle cx="100" cy="100" r="35" fill="#FFFFFF" />
  
  <!-- Eyes -->
  <circle cx="85" cy="90" r="6" fill="#000000" />
  <circle cx="115" cy="90" r="6" fill="#000000" />
  
  <!-- Beak -->
